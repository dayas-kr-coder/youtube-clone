<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,400;0,500;0,600;0,700;0,800;1,300;1,900&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>YouTube Clone</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/colors.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/video.css" />
    <!-- JS -->
    <script src="./js/app.js"></script>
  </head>
  <body>
    <!-- Header section start -->
    <div class="header">
      <div class="left-section">
        <img
          src="./icons/hamburger-menu.svg"
          alt="hamburger-menu"
          class="hamburger-menu"
        />
        <img
          src="./icons/youtube-logo.svg"
          alt="youtube-logo"
          class="youtube-logo"
        />
        <div class="country-name">IN</div>
      </div>
      <div class="middle-section">
        <div class="search-box">
          <form class="search-form">
            <div class="search-container">
              <input type="text" class="search-input" placeholder="Search" />
            </div>
          </form>
          <button class="search-button">
            <img class="search-icon" src="./icons/search.svg" alt="" />
          </button>
        </div>
        <button class="voice-search-button">
          <img
            src="./icons/voice-search-icon.svg"
            alt=""
            class="voice-search-icon"
          />
        </button>
      </div>
      <div class="right-section">
        <!-- mobile -->
        <button class="search-button">
          <img class="search-icon" src="./icons/search.svg" alt="" />
        </button>

        <button class="voice-search-button">
          <img
            src="./icons/voice-search-icon.svg"
            alt=""
            class="voice-search-icon"
          />
        </button>
        <!-- mobile -->
        <div class="upload-icon-container">
          <img class="upload-icon" src="./icons/upload.svg" alt="" />
        </div>
        <div class="notifications-icon-container">
          <img
            class="notifications-icon"
            src="./icons/notifications.svg"
            alt=""
          />
          <div class="notifications-count">3</div>
        </div>
        <img
          class="current-user-picture"
          src="./channel-picture/my-channel.jpeg"
          alt=""
        />
      </div>
    </div>
    <!-- Header section end -->
  </body>
</html>
